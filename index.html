<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zehra Koç</title>
  <meta name="description" content="Zehra Koç — kişisel portfolio">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #fff;
      color: #111;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      cursor: default;
    }

    .layer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-word {
      font-family: "Archivo Black", sans-serif;
      font-size: 25.5vw;
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
      white-space: nowrap;
    }

    /* ÖN KATMAN: beyaz zemin, siyah yazı */
    .front { background: #fff; }
    .front .hero-word { color: #111; animation: fadeIn 1.2s ease-out; }

    /* ARKA KATMAN: siyah zemin, malzeme dokulu yazı — maskeyle görünür */
    .back {
      background: #0a0a0a;
      clip-path: url(#blobClip);
      -webkit-clip-path: url(#blobClip);
    }
    .back-words { position: relative; }
    .back-words .hero-word {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.1s ease;
      background-size: 280% 280%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 6s ease-in-out infinite;
    }
    .back-words .hero-word.active { opacity: 1; }
    .back-words .hero-word.ghost { position: relative; visibility: hidden; }

    /* Malzeme dokuları: ana metalik gradyan + çapraz ikinci ışık katmanı.
       SVG displacement filtresi büyük yazıda her karede yeniden hesaplandığı
       için kullanılmıyor (ciddi performans sorunu yaratıyor). */
    .mat-foil {
      background-image:
        repeating-linear-gradient(65deg,
          rgba(255,255,255,0) 0 26px, rgba(255,255,255,0.35) 30px 34px,
          rgba(0,0,0,0.25) 40px 44px, rgba(255,255,255,0) 50px 60px),
        linear-gradient(115deg,
          #ff2d78 0%, #ffa3c7 12%, #c4004f 25%, #ff69a5 38%,
          #8f0038 52%, #ff2d78 65%, #ffd1e3 78%, #d6005c 90%, #ff2d78 100%);
    }
    .mat-chrome {
      background-image:
        repeating-linear-gradient(115deg,
          rgba(255,255,255,0) 0 30px, rgba(255,255,255,0.5) 34px 38px,
          rgba(0,0,0,0.3) 46px 50px, rgba(255,255,255,0) 58px 70px),
        linear-gradient(105deg,
          #e8e8e8 0%, #6a6a6a 15%, #ffffff 30%, #9c9c9c 45%,
          #f5f5f5 58%, #4d4d4d 72%, #e0e0e0 85%, #8a8a8a 100%);
    }
    .mat-gold {
      background-image:
        repeating-linear-gradient(75deg,
          rgba(255,255,255,0) 0 24px, rgba(255,248,220,0.4) 28px 32px,
          rgba(90,60,0,0.3) 38px 42px, rgba(255,255,255,0) 48px 58px),
        linear-gradient(120deg,
          #ffd700 0%, #b8860b 14%, #fff3b0 28%, #d4a017 42%,
          #8a6508 56%, #ffe066 70%, #c9971c 84%, #ffd700 100%);
    }

    @keyframes shimmer {
      0%   { background-position: 0% 40%; }
      50%  { background-position: 100% 60%; }
      100% { background-position: 0% 40%; }
    }

    .tagline {
      position: fixed;
      top: 28px;
      left: 28px;
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      font-weight: 500;
      line-height: 1.45;
      z-index: 3;
      mix-blend-mode: difference;
      color: #fff;
      pointer-events: none;
    }
    .footer-note {
      position: fixed;
      bottom: 24px;
      left: 28px;
      font-size: 0.85rem;
      color: #888;
      z-index: 3;
      mix-blend-mode: difference;
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      .back { display: none; }
      .back-words .hero-word, .front .hero-word { animation: none; }
    }
  </style>
</head>
<body>

  <div class="layer front" aria-hidden="false">
    <h1 class="hero-word">ZEHRA</h1>
  </div>

  <div class="layer back" aria-hidden="true">
    <div class="back-words">
      <span class="hero-word ghost">ZEHRA</span>
      <span class="hero-word mat-foil active">ZEHRA</span>
      <span class="hero-word mat-chrome">ZEHRA</span>
      <span class="hero-word mat-gold">ZEHRA</span>
    </div>
  </div>

  <p class="tagline">Merhaba, ben Zehra.<br>Portfolio yakında.</p>
  <p class="footer-note">zehrakoc.com</p>

  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <clipPath id="blobClip" clipPathUnits="userSpaceOnUse">
        <path id="blobPath" d=""/>
      </clipPath>
    </defs>
  </svg>

  <script>
    (function () {
      var reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduced) return;

      var path = document.getElementById("blobPath");
      var W = innerWidth, H = innerHeight;

      // Hedef: imleç (veya dokunma); yoksa kendi kendine gezinir
      var tx = W / 2, ty = H / 2;   // hedef
      var x = W / 2, y = H / 2;     // mevcut (yumuşak takip)
      var hasPointer = false, lastMove = 0;

      addEventListener("resize", function () { W = innerWidth; H = innerHeight; });
      addEventListener("mousemove", function (e) {
        tx = e.clientX; ty = e.clientY; hasPointer = true; lastMove = performance.now();
      });
      addEventListener("touchmove", function (e) {
        var t = e.touches[0];
        tx = t.clientX; ty = t.clientY; hasPointer = true; lastMove = performance.now();
      }, { passive: true });

      // Organik leke: daire üzerindeki noktaları sinüs gürültüsüyle oynat,
      // Catmull-Rom eğrisiyle pürüzsüz kapalı yola çevir
      var N = 10;
      function blobPoints(cx, cy, r, t) {
        var pts = [];
        for (var i = 0; i < N; i++) {
          var a = (i / N) * Math.PI * 2;
          var wob = Math.sin(t * 0.0011 + i * 1.7) * 0.55
                  + Math.sin(t * 0.0007 + i * 2.9 + 1.3) * 0.45;
          var rr = r * (1 + 0.28 * wob);
          pts.push([cx + Math.cos(a) * rr, cy + Math.sin(a) * rr]);
        }
        return pts;
      }
      function toPath(p) {
        var d = "M " + ((p[0][0] + p[N - 1][0]) / 2) + " " + ((p[0][1] + p[N - 1][1]) / 2);
        for (var i = 0; i < N; i++) {
          var a = p[i], b = p[(i + 1) % N];
          d += " Q " + a[0] + " " + a[1] + " " + ((a[0] + b[0]) / 2) + " " + ((a[1] + b[1]) / 2);
        }
        return d + " Z";
      }

      var start = performance.now();
      function frame(now) {
        var t = now - start;

        // İmleç uzun süre kıpırdamadıysa kendi kendine gezin
        if (!hasPointer || now - lastMove > 4000) {
          tx = W / 2 + Math.sin(t * 0.00033) * W * 0.3;
          ty = H / 2 + Math.sin(t * 0.00047 + 1.7) * H * 0.28;
        }
        x += (tx - x) * 0.07;
        y += (ty - y) * 0.07;

        // Yarıçap: girişte büyür, sonra hafifçe nefes alır
        var base = Math.min(W, H) * 0.24;
        var grow = Math.min(1, t / 1600);
        var r = base * grow * (1 + 0.06 * Math.sin(t * 0.0016));

        path.setAttribute("d", toPath(blobPoints(x, y, r, t)));
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);

      // Malzeme döngüsü: folyo → krom → altın (crossfade)
      var mats = document.querySelectorAll(".back-words .hero-word:not(.ghost)");
      var mi = 0;
      setInterval(function () {
        mats[mi].classList.remove("active");
        mi = (mi + 1) % mats.length;
        mats[mi].classList.add("active");
      }, 3500);
    })();
  </script>
</body>
</html>
